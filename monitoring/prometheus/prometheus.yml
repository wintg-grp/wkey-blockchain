global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: wintg
    chain: WINTG

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['127.0.0.1:9093']

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']

  - job_name: besu-mainnet
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:9545']
        labels: { node: 'validator-mainnet', role: 'validator', network: 'mainnet' }

  - job_name: besu-testnet
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:9546']
        labels: { node: 'validator-testnet', role: 'validator', network: 'testnet' }

  - job_name: node-exporter
    static_configs:
      - targets: ['127.0.0.1:9100']
        labels: { instance: 'wintg-server' }
