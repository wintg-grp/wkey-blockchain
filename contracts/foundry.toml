[profile.default]
src                = "src"
test               = "test/forge"
out                = "out"
libs               = ["node_modules", "lib"]
cache_path         = "forge-cache"
solc_version       = "0.8.24"
optimizer          = true
optimizer_runs     = 200
via_ir             = true
evm_version        = "cancun"
fuzz               = { runs = 1000, max_test_rejects = 65536 }
invariant          = { runs = 256, depth = 15 }
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "forge-std/=lib/forge-std/src/",
]

[profile.ci]
fuzz               = { runs = 5000 }

[fmt]
line_length = 120
tab_width   = 4
bracket_spacing = false
int_types   = "long"
