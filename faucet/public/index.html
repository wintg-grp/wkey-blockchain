<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WINTG Testnet Faucet</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background:#0b0f1a; color:#e8edf2; max-width:560px; margin:0 auto; padding:60px 20px; }
    h1 { font-size:28px; }
    .card { background:#141a2a; border:1px solid #233; border-radius:12px; padding:24px; }
    label { display:block; margin:16px 0 6px; font-weight:600; }
    input { width:100%; padding:12px; border-radius:8px; border:1px solid #345;
            background:#0e1422; color:#e8edf2; font-family:monospace; }
    button { background:#3aa6ff; color:#fff; border:none; padding:14px;
             border-radius:8px; width:100%; margin-top:20px; cursor:pointer;
             font-size:16px; font-weight:600; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
    .status { margin-top:16px; padding:12px; border-radius:8px; }
    .ok    { background:#0f3a1f; color:#7fe39a; }
    .err   { background:#3a0f0f; color:#ff8585; }
    a { color:#3aa6ff; }
    .meta { color:#7a8599; font-size:13px; margin-top:8px; }
  </style>
</head>
<body>
  <h1>🚰 WINTG Testnet Faucet</h1>
  <p>Receive 100 WTG on the WINTG Testnet (Chain ID 22800).</p>

  <div class="card">
    <label for="addr">Your wallet address</label>
    <input id="addr" placeholder="0x..." autocomplete="off">

    <div id="captcha" class="h-captcha"
         data-sitekey="REPLACE_WITH_HCAPTCHA_SITE_KEY" style="margin-top:16px;"></div>

    <button id="btn">Drip 100 WTG</button>
    <div id="status"></div>
    <p class="meta">Cooldown: 24 h per address &amp; per IP. Need more? Contact dev@wkey.app</p>
  </div>

  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <script>
  document.getElementById("btn").addEventListener("click", async () => {
    const status = document.getElementById("status");
    const addr = document.getElementById("addr").value.trim();
    const captcha = window.hcaptcha?.getResponse();
    if (!addr) { status.className="status err"; status.textContent="Please enter an address"; return; }
    if (!captcha) { status.className="status err"; status.textContent="Please complete the captcha"; return; }
    document.getElementById("btn").disabled = true;
    status.className=""; status.textContent="Dripping...";
    try {
      const res = await fetch("/api/drip", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ address: addr, captcha }),
      });
      const data = await res.json();
      if (res.ok) {
        status.className="status ok";
        status.innerHTML = `Sent ${data.amountWTG} WTG. <a href="${data.explorer}" target="_blank">View tx</a>`;
      } else {
        status.className="status err";
        status.textContent = data.error || "Error";
      }
    } catch (e) {
      status.className="status err"; status.textContent="Network error";
    } finally {
      document.getElementById("btn").disabled = false;
      window.hcaptcha?.reset();
    }
  });
  </script>
</body>
</html>
