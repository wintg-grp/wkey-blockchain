# =============================================================================
# WINTG — Stack locale complète (Besu IBFT 2.0 + Blockscout + Faucet)
# =============================================================================
# Lance la chaîne WINTG **en local** pour développement/test.
#
# Usage :
#   docker compose -f docker-compose.local.yml up -d
#   docker compose -f docker-compose.local.yml logs -f besu
#   docker compose -f docker-compose.local.yml down -v   # cleanup complet
#
# Endpoints locaux :
#   - RPC      : http://localhost:8545
#   - WS       : ws://localhost:8546
#   - Metrics  : http://localhost:9545/metrics
#   - Explorer : http://localhost:4000  (Blockscout, indexation 30-60s)
#   - Faucet   : http://localhost:3030
#
# Validateur local : Hardhat account 0 (clé connue publiquement — DEV ONLY)
#   Address    : 0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266
#   PrivateKey : 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
#
# Chain ID : 22800 (testnet local — distinct de la mainnet 2280)
# =============================================================================

services:
  besu:
    image: hyperledger/besu:24.10.0
    container_name: wintg-besu-local
    restart: unless-stopped
    ports:
      - "8545:8545"     # RPC HTTP
      - "8546:8546"     # WebSocket
      - "30303:30303"   # P2P (TCP+UDP)
      - "30303:30303/udp"
      - "9545:9545"     # Métriques Prometheus
    volumes:
      - ./besu/genesis.local.json:/etc/besu/genesis.json:ro
      - ./besu/keys/key.local:/etc/besu/key:ro
      - besu-data:/data
    environment:
      - BESU_OPTS=-Xmx4g -XX:+UseG1GC
    command:
      - --genesis-file=/etc/besu/genesis.json
      - --node-private-key-file=/etc/besu/key
      - --data-path=/data
      - --network-id=22800
      - --p2p-enabled=true
      - --p2p-host=0.0.0.0
      - --discovery-enabled=false
      - --rpc-http-enabled=true
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-cors-origins=*
      - --rpc-http-api=ETH,NET,WEB3,IBFT,ADMIN,DEBUG,TXPOOL,TRACE
      - --rpc-ws-enabled=true
      - --rpc-ws-host=0.0.0.0
      - --rpc-ws-port=8546
      - --rpc-ws-api=ETH,NET,WEB3,TXPOOL
      - --host-allowlist=*
      - --metrics-enabled=true
      - --metrics-host=0.0.0.0
      - --metrics-port=9545
      - --min-gas-price=0
      - --logging=INFO
      - --data-storage-format=BONSAI
      - --sync-mode=FULL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8545 --post-data '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' --header 'Content-Type: application/json' | grep -q result"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: wintg-blockscout-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: blockscout
      POSTGRES_PASSWORD: blockscout
      POSTGRES_DB: blockscout
    volumes:
      - blockscout-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wintg-blockscout-redis
    restart: unless-stopped
    volumes:
      - blockscout-redis:/data
    command: redis-server --appendonly yes

  blockscout:
    image: blockscout/blockscout:6.7.0
    container_name: wintg-blockscout-local
    restart: unless-stopped
    depends_on:
      besu:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://blockscout:blockscout@postgres:5432/blockscout
      - ETHEREUM_JSONRPC_VARIANT=besu
      - ETHEREUM_JSONRPC_HTTP_URL=http://besu:8545
      - ETHEREUM_JSONRPC_TRACE_URL=http://besu:8545
      - ETHEREUM_JSONRPC_WS_URL=ws://besu:8546
      - NETWORK=WINTG
      - SUBNETWORK=Local Testnet
      - CHAIN_ID=22800
      - COIN=WTG
      - COIN_NAME=WINTG
      - COIN_SYMBOL=WTG
      - PORT=4000
      - SECRET_KEY_BASE=local_secret_key_at_least_64_characters_long_for_phoenix_signing_x
      - REDIS_URL=redis://redis:6379/0
      - DISABLE_EXCHANGE_RATES=true
      - SHOW_PRICE_CHART=false
      - ECTO_USE_SSL=false
      - DATABASE_TIMEOUT=80000
    command: >
      sh -c "bin/blockscout eval 'Elixir.Explorer.ReleaseTasks.create_and_migrate()' &&
             bin/blockscout start"

  faucet:
    build:
      context: ./faucet
      dockerfile: Dockerfile
    container_name: wintg-faucet-local
    restart: unless-stopped
    depends_on:
      besu:
        condition: service_healthy
    ports:
      - "3030:3030"
    environment:
      - PORT=3030
      - RPC_URL=http://besu:8545
      # Hardhat account 1 (autre clé de test connue)
      - FAUCET_PRIVATE_KEY=0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d
      - HCAPTCHA_SECRET=
      - ALLOWED_ORIGINS=*
      - DRIP_AMOUNT_WTG=100
      - COOLDOWN_HOURS=1

volumes:
  besu-data:
  blockscout-pg:
  blockscout-redis:

networks:
  default:
    name: wintg-local
